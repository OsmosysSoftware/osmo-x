            stroke-linecap="round"
            fill="none"
          />

          <!-- Microphone stand -->
          <line
            x1="24"
            y1="36"
            x2="24"
            y2="42"
            stroke="var(--primary-color)"
            stroke-width="2.5"
            stroke-linecap="round"
          />

          <!-- Microphone base platform -->
          <line
            x1="18"
            y1="42"
            x2="30"
            y2="42"
            stroke="var(--primary-color)"
            stroke-width="3"
            stroke-linecap="round"
          />

          <!-- Sound wave 1 (left) -->
          <path
            d="M 10 16 Q 8 20, 10 24"
            stroke="var(--primary-color)"
