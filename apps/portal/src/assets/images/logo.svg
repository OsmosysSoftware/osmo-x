<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Microphone body -->
          <rect
            x="18"
            y="6"
            width="12"
            height="18"
            rx="6"
            fill="var(--primary-color)"
            opacity="0.9"
          />

          <!-- Microphone base -->
          <path
            d="M16 28 C16 32, 20 36, 24 36 C28 36, 32 32, 32 28"
            stroke="var(--primary-color)"
