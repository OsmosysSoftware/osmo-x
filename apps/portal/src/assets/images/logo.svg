          />
          <line
            x1="21"
            y1="14"
            x2="27"
            y2="14"
            stroke="rgba(255,255,255,0.3)"
            stroke-width="1.5"
            stroke-linecap="round"
          />
          <line
            x1="21"
            y1="18"
            x2="27"
            y2="18"
