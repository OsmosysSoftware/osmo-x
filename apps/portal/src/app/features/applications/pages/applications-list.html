<div class="card">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1
        class="text-3xl font-semibold text-surface-900 dark:text-surface-0 m-0 flex items-center gap-3"
      >
        <i class="pi pi-th-large text-primary"></i> Applications
      </h1>
      <p class="text-muted-color mt-2">Manage notification applications and settings</p>
    </div>
  </div>
  <p-toolbar class="mb-4">
    <ng-template #start>
      <div class="flex flex-wrap gap-2">
        <p-button label="New Application" icon="pi pi-plus" (onClick)="openCreate()" />
      </div>
    </ng-template>
    <ng-template #end>
      <div class="flex items-center gap-2">
        <p-iconfield iconPosition="left">
          <p-inputicon class="pi pi-search" />
          <input pInputText type="text" (input)="onGlobalFilter($event)" placeholder="Search..." />
        </p-iconfield>
        <p-button
          icon="pi pi-refresh"
          [rounded]="true"
          [text]="true"
          severity="secondary"
          pTooltip="Refresh"
          (onClick)="loadApplications()"
        />
      </div>
    </ng-template>
  </p-toolbar>

  @if (loading()) {
    <p-skeleton height="300px" />
  } @else {
    <p-card>
      <p-table
        #dt
        [value]="applications()"
        [globalFilterFields]="['name']"
        [rowHover]="true"
        [tableStyle]="{ 'min-width': '50rem' }"
      >
        <ng-template #header>
          <tr>
            <th pSortableColumn="application_id" style="min-width: 6rem">
              ID <p-sortIcon field="application_id" />
            </th>
            <th pSortableColumn="name" style="min-width: 12rem">
              Name <p-sortIcon field="name" />
            </th>
            <th>Status</th>
            <th>Test Mode</th>
            <th pSortableColumn="created_on" style="min-width: 10rem">
              Created <p-sortIcon field="created_on" />
            </th>
            <th style="min-width: 8rem">Actions</th>
          </tr>
        </ng-template>
        <ng-template #body let-app>
          <tr>
            <td>{{ app.application_id }}</td>
            <td>{{ app.name }}</td>
            <td>
              <p-tag
                [value]="app.status === 1 ? 'Active' : 'Inactive'"
                [severity]="app.status === 1 ? 'success' : 'danger'"
                [rounded]="true"
              />
            </td>
            <td>
              <p-tag
                [value]="app.test_mode_enabled ? 'On' : 'Off'"
                [severity]="app.test_mode_enabled ? 'warn' : 'secondary'"
                [rounded]="true"
              />
            </td>
            <td>{{ app.created_on | date: 'short' }}</td>
            <td>
              <div class="flex items-center gap-2">
                <p-button
                  icon="pi pi-pencil"
                  size="small"
                  pTooltip="Edit"
                  (onClick)="openEdit(app)"
                />
                <p-button
                  icon="pi pi-trash"
                  severity="danger"
                  size="small"
                  pTooltip="Delete"
                  (onClick)="confirmDelete(app)"
                />
              </div>
            </td>
          </tr>
        </ng-template>
        <ng-template #emptymessage>
          <tr>
            <td colspan="6" class="text-center py-8 text-muted-color">No applications found</td>
          </tr>
        </ng-template>
      </p-table>

      @if (pageInfo(); as pi) {
        <div class="mt-4">
          <app-pagination [pageInfo]="pi" (pageChange)="onPageChange($event)" />
        </div>
      }
    </p-card>
  }

  <!-- Create/Edit Dialog -->
  <p-dialog
    [visible]="dialogVisible()"
    (visibleChange)="dialogVisible.set($event)"
    [header]="editingApp() ? 'Edit Application' : 'New Application'"
    [modal]="true"
    [style]="{ width: '28rem' }"
  >
    <div class="flex flex-col gap-4 mt-2">
      <div class="flex flex-col gap-2">
        <label for="appName" class="font-medium">Name</label>
        <input
          pInputText
          id="appName"
          [ngModel]="formName()"
          (ngModelChange)="formName.set($event)"
          placeholder="Application name"
        />
      </div>
      <div class="flex items-center gap-3">
        <p-toggleSwitch
          [ngModel]="formTestMode()"
          (ngModelChange)="formTestMode.set($event)"
          inputId="testMode"
        />
        <label for="testMode" class="font-medium">Test Mode</label>
      </div>
    </div>
    <ng-template #footer>
      <p-button
        label="Cancel"
        severity="secondary"
        [text]="true"
        (onClick)="dialogVisible.set(false)"
      />
      <p-button
        label="Save"
        icon="pi pi-check"
        [disabled]="!formName().trim()"
        [loading]="saving()"
        (onClick)="save()"
      />
    </ng-template>
  </p-dialog>

  <p-confirmDialog />
</div>
