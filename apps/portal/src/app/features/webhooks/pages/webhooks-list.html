<div class="card">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1
        class="text-3xl font-semibold text-surface-900 dark:text-surface-0 m-0 flex items-center gap-3"
      >
        <i class="pi pi-bolt text-primary"></i> Webhooks
      </h1>
      <p class="text-muted-color mt-2">Manage webhook endpoints for providers</p>
    </div>
  </div>

  <p-toolbar class="mb-4">
    <ng-template #start>
      <div class="flex flex-wrap gap-2">
        <p-button
          label="New Webhook"
          icon="pi pi-plus"
          (onClick)="openCreate()"
          [disabled]="orgContext.isAllOrgsMode()"
        />
      </div>
    </ng-template>
    <ng-template #end>
      <div class="flex items-center gap-2">
        <p-iconfield iconPosition="left">
          <p-inputicon class="pi pi-search" />
          <input pInputText type="text" (input)="onGlobalFilter($event)" placeholder="Search..." />
        </p-iconfield>
        <p-button
          icon="pi pi-refresh"
          [rounded]="true"
          [text]="true"
          severity="secondary"
          pTooltip="Refresh"
          (onClick)="loadWebhooks()"
        />
      </div>
    </ng-template>
  </p-toolbar>

  @if (loading()) {
    <p-skeleton height="200px" />
  } @else {
    <p-table
      #dt
      [value]="webhooks()"
      [globalFilterFields]="['webhook_url']"
      [rowHover]="true"
      [stripedRows]="true"
      [tableStyle]="{ 'min-width': '50rem' }"
    >
      <ng-template #header>
        <tr>
          <th style="min-width: 12rem">Provider</th>
          <th style="min-width: 20rem">URL</th>
          <th>Status</th>
          <th pSortableColumn="created_on" style="min-width: 10rem">
            Created <p-sortIcon field="created_on" />
          </th>
          <th style="min-width: 8rem">Actions</th>
        </tr>
      </ng-template>
      <ng-template #body let-w>
        <tr>
          <td>{{ getProviderName(w.provider_id) }}</td>
          <td class="max-w-xs truncate">{{ w.webhook_url }}</td>
          <td>
            <p-tag
              [value]="w.status === 1 ? 'Active' : 'Inactive'"
              [severity]="w.status === 1 ? 'success' : 'danger'"
              [rounded]="true"
            />
          </td>
          <td>{{ w.created_on | date: 'short' }}</td>
          <td>
            <div class="flex items-center gap-2">
              <p-button
                icon="pi pi-pencil"
                size="small"
                pTooltip="Edit"
                (onClick)="openEdit(w)"
                [disabled]="orgContext.isAllOrgsMode()"
              />
              <p-button
                icon="pi pi-trash"
                severity="danger"
                size="small"
                pTooltip="Delete"
                (onClick)="confirmDelete(w)"
                [disabled]="orgContext.isAllOrgsMode()"
              />
            </div>
          </td>
        </tr>
      </ng-template>
      <ng-template #emptymessage>
        <tr>
          <td colspan="5" class="!text-center py-8 text-muted-color">No webhooks found</td>
        </tr>
      </ng-template>
    </p-table>

    @if (pageInfo(); as pi) {
      <app-pagination [pageInfo]="pi" (paginationChange)="onPageChange($event)" />
    }
  }
</div>

<!-- Create/Edit Webhook Dialog -->
<p-dialog
  [header]="editingWebhook() ? 'Edit Webhook' : 'New Webhook'"
  [visible]="dialogVisible()"
  (visibleChange)="dialogVisible.set($event)"
  [modal]="true"
  [dismissableMask]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '500px' }"
>
  <div class="flex flex-col gap-4 pt-2">
    @if (!editingWebhook()) {
      <div class="flex flex-col gap-2">
        <label for="webhook-provider" class="block text-surface-900 dark:text-surface-0 font-medium"
          >Provider <span class="text-red-500">*</span></label
        >
        <p-select
          id="webhook-provider"
          [options]="providers()"
          optionLabel="name"
          optionValue="provider_id"
          placeholder="Select a provider"
          [ngModel]="formProviderId()"
          (ngModelChange)="formProviderId.set($event)"
          [filter]="true"
          filterPlaceholder="Search providers"
          appendTo="body"
          [fluid]="true"
        />
      </div>
    }
    <div class="flex flex-col gap-2">
      <label for="webhook-url" class="block text-surface-900 dark:text-surface-0 font-medium"
        >Webhook URL <span class="text-red-500">*</span></label
      >
      <input
        pInputText
        id="webhook-url"
        [ngModel]="formUrl()"
        (ngModelChange)="formUrl.set($event)"
        placeholder="https://example.com/webhook"
      />
    </div>
  </div>
  <ng-template #footer>
    <div class="flex justify-end gap-2">
      <p-button
        label="Cancel"
        icon="pi pi-times"
        severity="secondary"
        [outlined]="true"
        (onClick)="dialogVisible.set(false)"
      />
      <p-button
        label="Save"
        icon="pi pi-check"
        (onClick)="save()"
        [disabled]="!formUrl().trim() || (!editingWebhook() && !formProviderId()) || saving()"
        [loading]="saving()"
      />
    </div>
  </ng-template>
</p-dialog>

<p-confirmDialog />
