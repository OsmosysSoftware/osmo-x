<app-floating-configurator />
<div
  class="bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen min-w-screen overflow-hidden"
>
  <div class="flex flex-col items-center justify-center">
    <div
      style="
        border-radius: 56px;
        padding: 0.3rem;
        background: linear-gradient(180deg, var(--primary-color) 10%, rgba(33, 150, 243, 0) 30%);
      "
    >
      <div
        class="w-full bg-surface-0 dark:bg-surface-900 py-20 px-8 sm:px-20"
        style="border-radius: 53px"
      >
        <div class="text-center mb-8">
          <app-logo height="40px" class="mb-4" />
          <p class="text-muted-color font-medium text-lg mt-0">Sign in to your account</p>
        </div>

        @if (errorMessage()) {
          <p-message severity="error" [text]="errorMessage()" styleClass="mb-4 w-full" />
        }

        <form (ngSubmit)="onSubmit()">
          <div class="mb-8">
            <label
              for="email"
              class="block text-surface-900 dark:text-surface-0 text-xl font-medium mb-2"
              >Email</label
            >
            <input
              pInputText
              id="email"
              type="email"
              placeholder="Email"
              class="w-full md:w-120"
              [ngModel]="email()"
              (ngModelChange)="email.set($event)"
              name="email"
              required
              [disabled]="loading()"
            />
          </div>

          <div class="mb-4">
            <label
              for="password"
              class="block text-surface-900 dark:text-surface-0 font-medium text-xl mb-2"
              >Password</label
            >
            <p-password
              id="password"
              [ngModel]="password()"
              (ngModelChange)="password.set($event)"
              name="password"
              placeholder="Password"
              [toggleMask]="true"
              [fluid]="true"
              [feedback]="false"
              [disabled]="loading()"
              required
            />
          </div>

          <div class="flex items-center justify-between mt-2 mb-8 gap-8">
            <div class="flex items-center">
              <p-checkbox
                [ngModel]="rememberMe()"
                (ngModelChange)="rememberMe.set($event)"
                id="rememberMe"
                name="rememberMe"
                binary
                class="mr-2"
                [disabled]="loading()"
              />
              <label for="rememberMe">Remember me</label>
            </div>
          </div>

          <p-button
            label="Sign In"
            type="submit"
            styleClass="w-full"
            [loading]="loading()"
            [disabled]="loading()"
          />
        </form>
      </div>
    </div>
  </div>
</div>
