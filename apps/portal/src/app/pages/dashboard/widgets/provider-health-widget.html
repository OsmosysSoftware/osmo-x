<div class="border border-surface rounded-lg p-4">
  <h3 class="text-lg font-semibold m-0 mb-4">Provider Health</h3>
  @if (loading()) {
    <p-skeleton height="200px" />
  } @else if (rows().length > 0) {
    <p-table
      [value]="rows()"
      [rows]="10"
      [scrollable]="true"
      scrollHeight="320px"
      styleClass="p-datatable-sm p-datatable-striped"
    >
      <ng-template #header>
        <tr>
          <th>Provider</th>
          <th>Channel</th>
          <th class="text-right">Total</th>
          <th class="text-right">Success Rate</th>
          <th class="text-right">Avg Retries</th>
        </tr>
      </ng-template>
      <ng-template #body let-row>
        <tr>
          <td>{{ row.provider_name }}</td>
          <td>{{ row.channel_label }}</td>
          <td class="text-right">{{ row.total }}</td>
          <td class="text-right">
            <p-tag [value]="row.success_rate + '%'" [severity]="getSeverity(row.success_rate)" />
          </td>
          <td class="text-right">{{ row.avg_retry_count }}</td>
        </tr>
      </ng-template>
    </p-table>
  } @else {
    <div class="flex items-center justify-center h-40 text-muted-color">
      <p>No provider data available</p>
    </div>
  }
</div>
