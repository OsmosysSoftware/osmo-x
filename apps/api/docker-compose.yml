name: ${COMPOSE_PROJECT_NAME:-osmo-x}

services:
  osmox-postgres:
    image: postgres:18-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-osmo-x}-postgres
    restart: unless-stopped
    ports:
      - '${DB_DOCKER_PORT:-5433}:5432'
    environment:
      POSTGRES_USER: '${DB_USERNAME}'
      POSTGRES_PASSWORD: '${DB_PASSWORD}'
      POSTGRES_DB: '${DB_NAME}'
      PGDATA: /var/lib/postgresql/data
    volumes:
      - osmox-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - osmox-network

  osmox-redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-osmo-x}-redis
    restart: unless-stopped
    ports:
      - '${REDIS_DOCKER_PORT:-6397}:6379'
    volumes:
      - osmox-redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - osmox-network

  osmox-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: osmox-api-${COMPOSE_PROJECT_NAME:-osmo-x}
    container_name: ${COMPOSE_PROJECT_NAME:-osmo-x}-api
    restart: unless-stopped
    ports:
      - '127.0.0.1:${SERVER_PORT:-3000}:${SERVER_PORT:-3000}'
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DB_HOST: ${COMPOSE_PROJECT_NAME:-osmo-x}-postgres
      DB_PORT: 5432
      REDIS_HOST: ${COMPOSE_PROJECT_NAME:-osmo-x}-redis
      REDIS_PORT: 6379
    depends_on:
      osmox-postgres:
        condition: service_healthy
      osmox-redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - osmox-network
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:${SERVER_PORT:-3000}/', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    logging:
      driver: 'json-file'
      options:
        max-size: '${LOG_MAX_SIZE:-10m}'
        max-file: '${LOG_MAX_FILES:-5}'

  osmox-dozzle:
    image: amir20/dozzle:latest
    container_name: ${COMPOSE_PROJECT_NAME:-osmo-x}-dozzle
    restart: unless-stopped
    ports:
      - '${DOZZLE_HOST_PORT:-8080}:8080'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - osmox-dozzle-data:/data
    environment:
      DOZZLE_AUTH_PROVIDER: simple
      DOZZLE_FILTER: 'name=${COMPOSE_PROJECT_NAME:-osmo-x}*'
      DOZZLE_LEVEL: '${DOZZLE_LEVEL:-info}'
      DOZZLE_NO_ANALYTICS: 'true'
    networks:
      - osmox-network
    depends_on:
      osmox-dozzle-auth-init:
        condition: service_completed_successfully

  osmox-dozzle-auth-init:
    image: alpine:latest
    container_name: ${COMPOSE_PROJECT_NAME:-osmo-x}-dozzle-init
    volumes:
      - osmox-dozzle-data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      ADMIN_USER: '${ADMIN_USER:-admin}'
      ADMIN_PASSWORD: '${ADMIN_PASSWORD}'
    command:
      - sh
      - -c
      - |
        apk add --no-cache docker-cli > /dev/null 2>&1
        docker run --rm amir20/dozzle generate "$$ADMIN_USER" --password "$$ADMIN_PASSWORD" > /data/users.yml
        echo "Dozzle auth configured for user: $$ADMIN_USER"
    restart: 'no'
    networks:
      - osmox-network

volumes:
  osmox-postgres-data:
    driver: local
  osmox-redis-data:
    driver: local
  osmox-dozzle-data:
    driver: local

networks:
  osmox-network:
    driver: bridge
